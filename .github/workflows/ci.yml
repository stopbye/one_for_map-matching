name: Python Checks

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python scripts
        run: python -m py_compile pipeline.py *.py

      - name: Check dependency file
        shell: bash
        run: |
          test -f requirements.txt
          grep -q "pandas" requirements.txt
          grep -q "gotrackit" requirements.txt
